name: Android Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-and-release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"
                  cache: gradle

            - name: Grant execute permission for Gradle wrapper
              run: chmod +x gradlew

            - name: Compute version values
              id: version
              run: |
                  VERSION_NAME="${GITHUB_REF_NAME#v}"
                  VERSION_CODE="${GITHUB_RUN_NUMBER}"
                  echo "name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
                  echo "code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

            - name: Build release APK and AAB
              run: |
                  ./gradlew assembleRelease bundleRelease \
                    -PVERSION_NAME=${{ steps.version.outputs.name }} \
                    -PVERSION_CODE=${{ steps.version.outputs.code }}

            - name: Publish GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: WifiShortcut v${{ steps.version.outputs.name }}
                  generate_release_notes: true
                  files: |
                      app/build/outputs/apk/release/*.apk
                      app/build/outputs/bundle/release/*.aab
